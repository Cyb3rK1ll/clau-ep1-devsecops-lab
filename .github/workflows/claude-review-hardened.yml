name: Claude Code Review (HARDENED)

on:
  pull_request:                   # ✅ #5: sin _target; PRs de fork NO reciben secrets del base
    types: [opened, synchronize, reopened]

permissions:                      # ✅ #2: least privilege
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository  # ✅ #5: solo PRs del mismo repo
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (egress firewall)           # ✅ #4
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block        # primera pasada: usar 'audit', leer baseline, luego 'block'
          disable-telemetry: true
          # OJO: dentro del bloque '>' los '#' NO son comentarios (son texto literal),
          # asi que la allowlist debe contener SOLO entradas host:port. El dominio del
          # listener (webhook.site) queda intencionalmente AFUERA -> en block se bloquea.
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            private-user-images.githubusercontent.com:443
            codeload.github.com:443
            registry.npmjs.org:443
            api.anthropic.com:443
            claude.ai:443
            downloads.claude.ai:443
            openrouter.ai:443

      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0   # ✅ #1 v6.0.3

      - name: Build & test
        run: |
          npm ci                       # postinstall corre igual, pero: secreto ausente + egress bloqueado
          npm test --if-present
        # ✅ #3: CANARY_TOKEN intencionalmente NO se pasa a este step

      - name: Claude review
        uses: anthropics/claude-code-action@8897fb4a6a67cd7564a6da5aa60f5f518b61f584  # ✅ #1 v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}             # postea con GITHUB_TOKEN (sin GitHub App / OIDC)
          track_progress: true                          # postea un comentario visible con el resumen del review
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            Review this PR for security issues and bugs.
            Post a summary of your findings, and add inline comments on changed lines where applicable.
          claude_args: |
            --allowedTools "Read,Glob,Grep,mcp__github_inline_comment__create_inline_comment"   # ✅ #3: lectura + comentar, sin Bash ni WebFetch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # ✅ #3: solo la key que necesita
          # --- Provider: OpenRouter (Anthropic-compatible skin) ---
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_DEFAULT_OPUS_MODEL: "~anthropic/claude-haiku-latest"     # Haiku: confiable + barato (~$0.05/run)
          ANTHROPIC_DEFAULT_SONNET_MODEL: "~anthropic/claude-haiku-latest"
          ANTHROPIC_DEFAULT_HAIKU_MODEL: "~anthropic/claude-haiku-latest"
          CLAUDE_CODE_MAX_OUTPUT_TOKENS: "8000"      # cap para no pasar el presupuesto de OpenRouter (evita 402)
